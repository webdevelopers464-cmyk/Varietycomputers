
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered Place PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-header: #3d5a80;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border-color: #dfe4ea;
            --button-primary: #4caf50;
            --button-danger: #e74c3c;
            --button-warning: #f39c12;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-header: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --border-color: #2d3748;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: var(--bg-header);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: #ccc;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #4caf50;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(30px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Order Form Card */
        .order-form-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px var(--shadow);
            margin-bottom: 3rem;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-form-card h2 {
            margin-bottom: 2rem;
            font-size: 1.8rem;
            color: var(--text-primary);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--button-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Orders Section */
        .orders-section {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .orders-section h2 {
            margin-bottom: 2rem;
            font-size: 1.8rem;
            color: var(--text-primary);
        }

        /* Table Styles */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
        }

        .orders-table thead {
            background: var(--bg-header);
            color: white;
        }

        .orders-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .orders-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .orders-table tbody tr {
            transition: background 0.2s;
        }

        .orders-table tbody tr:hover {
            background: var(--bg-primary);
        }

        /* Action Buttons */
        .action-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 0.5rem;
        }

        .edit-btn {
            background: var(--button-warning);
            color: white;
        }

        .edit-btn:hover {
            background: #e67e22;
            transform: scale(1.05);
        }

        .delete-btn {
            background: var(--button-danger);
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        /* Success Popup */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .popup-overlay.active {
            display: flex;
        }

        .popup {
            background: var(--bg-secondary);
            padding: 3rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 400px;
            width: 90%;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .popup h3 {
            margin-bottom: 1rem;
            color: var(--button-primary);
            font-size: 1.8rem;
        }

        .popup p {
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .popup-close-btn {
            padding: 0.8rem 2rem;
            background: var(--button-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .popup-close-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .order-form-card,
            .orders-section {
                padding: 1.5rem;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .orders-table {
                font-size: 0.85rem;
            }

            .orders-table th,
            .orders-table td {
                padding: 0.6rem;
            }

            .action-btn {
                padding: 0.4rem 0.7rem;
                font-size: 0.8rem;
                margin-bottom: 0.3rem;
            }
        }

        /* Table wrapper for mobile scroll */
        .table-wrapper {
            overflow-x: auto;
        }
    </style>
    <style>
    :root{--bg:#f6f8fa;--card:#ffffff;--accent:#4caf50;--muted:#6b7280;--header:#0f1724;--radius:12px}
    body{font-family: 'Poppins', sans-serif;background:var(--bg);color:var(--header);margin:0;line-height:1.6}
    .container{max-width:1100px;margin:2rem auto;padding:1rem}
    header{background:linear-gradient(90deg,#1f4b6b,#3d5a80);color:#fff;padding:1rem 1.5rem;border-radius:10px;box-shadow:0 6px 20px rgba(15,23,36,0.08)}
    .order-form-card,.orders-section{background:var(--card);border-radius:12px;padding:1.5rem;box-shadow:0 6px 20px rgba(15,23,36,0.06)}
    .submit-btn, .action-btn, .popup-close-btn{background:var(--accent);color:#fff;border:none;padding:.8rem 1rem;border-radius:8px;cursor:pointer}
    input,select,textarea{padding:.7rem;border:1px solid #e5e7eb;border-radius:8px;width:100%;box-sizing:border-box}
    table{width:100%;border-collapse:collapse}
    .orders-table thead{background:linear-gradient(90deg,var(--accent),#2b9a68);color:#fff}
    .orders-table th,.orders-table td{padding:.8rem}
    .popup{max-width:420px}
    @media(max-width:768px){.container{padding:0 1rem}.order-form-card,.orders-section{padding:1rem}}
    </style>
    </head>
<body>
    <!-- Header -->
    <header>
        <h1>Ordered Place</h1>
        <div class="theme-toggle">
            <span style="font-size: 1.2rem;">☀️</span>
            <div class="toggle-switch" id="themeToggle">
                <div class="toggle-slider"></div>
            </div>
            <span style="font-size: 1.2rem;">🌙</span>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Order Form -->
        <div class="order-form-card">
                <h2>Place Your Order</h2>
            <form id="orderForm" action="https://formspree.io/f/xdalzpqb" method="POST">
            <!-- <form action="https://formspree.io/f/xdalzpqb" method="POST"> -->
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="product">Product</label>
                    <select id="product" name="product" required>
                        <option value="">Select a product</option>
                        <option value="Floralia - Rs 1500">Samsung Galaxy S21 Ultra - Rs 28,499</option>
                        <option value="Mystic Rose - Rs 1800">Mechanical Keyboard - Rs 4,999</option>
                        <option value="Ocean Breeze - Rs 1600">Jinko 540W Solar Panel - Rs 16,999</option>
                        <option value="Velvet Noir - Rs 2000">Solar Panel Mounting Structure - Rs 9,499</option>
                        <option value="Golden Amber - Rs 1700">IP Security Camera  - Rs 6,799</option>
                        <option value="Lavender Dreams - Rs 1400">Mini Hidden Camera - Rs 4,299</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" value="1" min="1" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" placeholder="Enter your delivery address" required></textarea>
                </div>
                    <button type="submit" class="submit-btn">Submit Order</button>
            </form>
        </div>

        <!-- Orders Table -->
        <div class="orders-section">
            <h2>Orders</h2>
            <div class="table-wrapper">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- Orders will be dynamically inserted here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📦</div>
                    <h3>No Orders Yet</h3>
                    <p>Your orders will appear here once you place them</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Popup -->
    <div class="popup-overlay" id="successPopup">
        <div class="popup">
            <div class="success-icon">✅</div>
            <h3>Order Placed Successfully!</h3>
            <p>Your order has been received and will be processed shortly.</p>
            <button class="popup-close-btn" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        // IMPORTANT: After setting up EmailJS, replace these values with your actual credentials

        // const EMAILJS_SERVICE_ID = 'service_restaurant';  // Get from EmailJS Account > API Keys
        // const EMAILJS_TEMPLATE_ID = 'template_customer_confirmation'; // Template name you created
        // const EMAILJS_PUBLIC_KEY = 'QzSEVRG3nVMvZ1I7C'; // Get from EmailJS Account > API Keys
        
        // // Load EmailJS library
        // const script = document.createElement('script');
        // script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js';
        // script.onload = function() {
        //     emailjs.init(EMAILJS_PUBLIC_KEY);
        //     console.log('EmailJS loaded. Ready to send emails.');
        // };
        // document.head.appendChild(script);

// Make sure to include EmailJS SDK in your HTML first
// <script src="https://cdn.emailjs.com/dist/email.min.js">
// emailjs.init("YOUR_PUBLIC_KEY");
// <------------------------------------------order form===----------------->
document.getElementById('order-form').addEventListener('submit', function(e) {
    e.preventDefault();

    emailjs.sendForm('service_bl83v4k', 'template_6yj68gh', this)
      .then(() => {
        alert('Email sent successfully!');
      }, (error) => {
        console.error('Failed to send email:', error);
      });
});

        // Initialize orders array from localStorage
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let editingIndex = -1;

        // Dark mode functionality
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.classList.add('active');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            themeToggle.classList.toggle('active');
            
            // Save theme preference
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        // Form submission
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const form = this;
            const fullName = document.getElementById('fullName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const emailValue = document.getElementById('email').value.trim();
            const product = document.getElementById('product').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const address = document.getElementById('address').value.trim();

            // Validate all fields
            if (!fullName || !phoneNumber || !emailValue || !product || !quantity || !address) {
                alert('Please fill in all fields!');
                return;
            }

            // Extract price from product string
            const priceMatch = product.match(/Rs (\d+)/);
            const price = priceMatch ? parseInt(priceMatch[1]) : 0;
            const total = price * quantity;

            const order = {
                fullName,
                phoneNumber,
                email: emailValue,
                product,
                quantity,
                price,
                total,
                address,
                date: new Date().toLocaleString()
            };

            if (editingIndex === -1) {
                // Add new order
                orders.push(order);
            } else {
                // Update existing order
                orders[editingIndex] = order;
                editingIndex = -1;
                document.querySelector('.submit-btn').textContent = 'Submit Order';
            }

            // Save to localStorage
            localStorage.setItem('orders', JSON.stringify(orders));

            // Render orders FIRST
            renderOrders();

            // Show success popup
            showPopup();

            // Send to Formspree (owner notification)
            const formData = new FormData(form);
            formData.append('_replyto', emailValue);
            formData.append('_subject', `Order received: ${product}`);
            fetch(form.action, {
                method: "POST",
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).catch(err => console.log('Owner notification sent'));

            // Send confirmation email to customer using EmailJS
            if (typeof emailjs !== 'undefined') {
                const customerEmailParams = {
                    to_email: emailValue,
                    to_name: fullName,
                    product_name: product.split(' - ')[0],
                    quantity: quantity,
                    price: price,
                    total: total,
                    address: address,
                    phone: phoneNumber,
                    order_date: new Date().toLocaleString()
                };

                emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, customerEmailParams)
                    .then(function(response) {
                        console.log('✅ Customer confirmation email sent successfully');
                    })
                    .catch(function(error) {
                        console.log('⚠️ Email sending message - this is normal during setup');
                        console.log('Setup EmailJS using the guide at: EMAIL_SETUP_GUIDE.md');
                    });
            } else {
                console.log('📧 EmailJS not loaded yet - Follow the setup guide to enable customer emails');
            }

            // Reset form
            form.reset();
        });

        // Show popup
        function showPopup() {
            const popup = document.getElementById('successPopup');
            popup.classList.add('active');
        }

        // Close popup
        function closePopup() {
            const popup = document.getElementById('successPopup');
            popup.classList.remove('active');
        }

        // Render orders in table
        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            const emptyState = document.getElementById('emptyState');

            if (orders.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = orders.map((order, index) => `
                <tr>
                    <td>${order.fullName}</td>
                    <td>${order.phoneNumber}</td>
                    <td>${order.product.split(' - ')[0]}</td>
                    <td>${order.quantity}</td>
                    <td>Rs ${order.price}</td>
                    <td><strong>Rs ${order.total}</strong></td>
                    <td>${order.address}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editOrder(${index})">
                            ✏️ Edit
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteOrder(${index})">
                            🗑️ Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Edit order
        function editOrder(index) {
            const order = orders[index];
            editingIndex = index;

            // Fill form with order data
            document.getElementById('fullName').value = order.fullName;
            document.getElementById('phoneNumber').value = order.phoneNumber;
            document.getElementById('email').value = order.email || '';
            document.getElementById('product').value = order.product;
            document.getElementById('quantity').value = order.quantity;
            document.getElementById('address').value = order.address;

            // Change button text
            document.querySelector('.submit-btn').textContent = 'Update Order';

            // Scroll to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete order
        function deleteOrder(index) {
            if (confirm('Are you sure you want to delete this order?')) {
                orders.splice(index, 1);
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        // Close popup when clicking outside
        document.getElementById('successPopup').addEventListener('click', function(e) {
            if (e.target === this) {
                closePopup();
            }
        });

        // Initial render
        renderOrders();
    </script>
</body>
</html>
